services:
  crypto-signal-bot:
    build: .
    container_name: crypto-signal-bot
    restart: unless-stopped

    # Load variables from .env file
    env_file:
      - .env

    # Persist SQLite database between restarts
    volumes:
      - bot-data:/app/data

    # Timezone
    environment:
      - TZ=Europe/Warsaw

    # Resource limits (lightweight — ~128MB RAM)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
